name: "[Build/Deploy] suite-sync to dev server"

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".k8s/**"

permissions:
  packages: write
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-suite-sync-image:
    uses: ./.github/workflows/build-and-push-image.yml
    with:
      image_name: suite-sync-dev
      environment: 'dev'
      push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      build-args: |
        BUILDKIT_INLINE_CACHE=1

  update-deployment-manifests:
    name: deployment-manifests-backend
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - build-suite-sync-image
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Switch to target branch
        run: |
          git checkout gitops/dev || git checkout -b gitops/dev

      - name: Update to current dev images
        uses: mikefarah/yq@v4.52.4
        with:
          cmd: |
            yq -i '
               (.images[] | select(.name == "538326561891.dkr.ecr.eu-central-1.amazonaws.com/suite-sync-dev").newTag)  = "sha-${{ github.sha }}"
            ' .k8s/development/kustomization.yaml

      - name: Create commit with updated images
        uses: EndBug/add-and-commit@v9
        with:
          add: ".k8s/**/*.y*ml"
          message: "[Deployment][skip ci] update to current dev image tag"
          committer_name: trezor-bot[bot]
          committer_email: 208941332+trezor-bot[bot]@users.noreply.github.com
          push: origin gitops/dev --set-upstream
