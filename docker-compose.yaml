services:
    db:
        container_name: postgres
        image: postgres
        environment:
            POSTGRES_USER: ${POSTGRES_GATE_USER}
            POSTGRES_PASSWORD: ${POSTGRES_GATE_PASSWORD}
            PGDATA: /data/postgres
            POSTGRES_DB: ${POSTGRES_GATE_DB}
        ports:
            - '5432:5432'
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -d postgres']
            interval: 30s
            timeout: 10s
            retries: 5
