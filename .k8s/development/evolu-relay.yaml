apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: evolu-relay
  namespace: suite-sync
  labels:
    app.kubernetes.io/name: evolu-relay
    app.kubernetes.io/part-of: suite-sync
spec:
  serviceName: evolu-relay
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: evolu-relay
  template:
    metadata:
      labels:
        app.kubernetes.io/name: evolu-relay
        app.kubernetes.io/part-of: suite-sync
    spec:
      containers:
        - name: evolu-relay
          image: 538326561891.dkr.ecr.eu-central-1.amazonaws.com/suite-sync-dev
          command: ["yarn", "start-evolu-relay"]
          ports:
            - name: relay
              containerPort: 4000
            - name: health
              containerPort: 4002
          env:
            - name: SERVER_ENV
              value: "dev"
            - name: QUOTA_MANAGER_PORT    
              value: "4001"
            - name: HEALTH_PORT
              value: "4002"
            - name: POSTGRES_GATE_HOST
              valueFrom:
                secretKeyRef:
                  name: suite-sync-dev-secrets
                  key: POSTGRES_GATE_RO_HOST
            - name: POSTGRES_GATE_USER
              value: "suite-sync"
            - name: POSTGRES_GATE_PORT
              value: "5432"
            - name: POSTGRES_GATE_DB
              value: "suite_sync_qm_dev"
            - name: POSTGRES_GATE_SSL
              value: "true"
            - name: POSTGRES_GATE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: suite-sync-dev-secrets
                  key: POSTGRES_GATE_PASSWORD
          volumeMounts:
            - name: evolu-relay-data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 256Mi
  volumeClaimTemplates:
    - metadata:
        name: evolu-relay-data
      spec:
        storageClassName: ebs-sc
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: evolu-relay
  namespace: suite-sync
  labels:
    app.kubernetes.io/name: evolu-relay
    app.kubernetes.io/part-of: suite-sync
spec:
  selector:
    app.kubernetes.io/name: evolu-relay
  ports:
    - name: relay
      port: 4000
      targetPort: 4000
    - name: health
      port: 4002
      targetPort: 4002
